name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Windows (x64 + ia32)
        run: npx electron-builder --win --x64 --ia32 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            release/*.exe
            release/*.blockmap
            release/*.nsis.zip
            release/*.yml
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build macOS (x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            release/*.dmg
            release/*.blockmap
            release/*.zip
            release/*.yml
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: ls -la artifacts/

      - name: Read changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE="changelogs/v${VERSION}.md"
          echo "Looking for changelog: $FILE"
          if [ -f "$FILE" ]; then
            echo "Found changelog file"
            # Use delimiter approach to safely pass multiline content
            echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
            cat "$FILE" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "No changelog found, using default"
            echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
            echo "Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
